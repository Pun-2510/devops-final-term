name: CI/CD to EKS

on:
  push:
    branches: [ main ]

env:
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
# =========================
# 1. BUILD & PUSH
# =========================
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            project/backend/node_modules
            project/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install deps
        run: |
          cd project/backend && npm install
          cd ../frontend && npm install

      - name: Lint
        run: |
          cd project/backend && npx eslint@8.57.0 .
          cd ../frontend && npx eslint@8.57.0 .

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Build frontend
        run: |
          cd project/frontend && npm run build

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t $DOCKER_USER/backend-app:$IMAGE_TAG ./project/backend
          docker push $DOCKER_USER/backend-app:$IMAGE_TAG

      - name: Build & Push Frontend
        run: |
          docker build -t $DOCKER_USER/frontend-app:$IMAGE_TAG ./project/frontend
          docker push $DOCKER_USER/frontend-app:$IMAGE_TAG

      # Inject image vào BASE
      - name: Inject image into base.yaml
        run: |
          sed -i "s|BACKEND_IMAGE|$DOCKER_USER/backend-app:$IMAGE_TAG|g" k8s/base.yaml
          sed -i "s|FRONTEND_IMAGE|$DOCKER_USER/frontend-app:$IMAGE_TAG|g" k8s/base.yaml

      - name: Upload manifests
        uses: actions/upload-artifact@v4
        with:
          name: k8s
          path: k8s/

# =========================
# 2. STAGING DEPLOY
# =========================
  staging-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    environment:
      name: staging
      url: https://staging.baocaohoc.online

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: k8s
          path: k8s/

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      - name: Create namespace
        run: |
          kubectl create namespace staging || true

      - name: Deploy BASE (staging)
        run: kubectl apply -f k8s/base.yaml -n staging

      - name: Deploy STAGING config
        run: kubectl apply -f k8s/staging.yaml

      - name: Deploy HPA
        run: kubectl apply -f k8s/hpa.yaml -n staging

      - name: Wait Mongo ready
        run: |
          kubectl rollout status statefulset/mongo -n staging

      - name: Seed Data (staging)
        run: |
          kubectl delete job seed-job -n staging || true
          kubectl apply -f k8s/seed-job.yaml -n staging
          kubectl wait --for=condition=complete job/seed-job -n staging --timeout=120s || \
          kubectl logs job/seed-job -n staging || exit 1

      - name: Rollout check (staging)
        run: |
          kubectl rollout status deployment/backend -n staging || exit 1
          kubectl rollout status deployment/frontend -n staging || exit 1

# =========================
# 3. PRODUCTION DEPLOY
# =========================
  production-deploy:
    needs: staging-deploy
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://baocaohoc.online

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: k8s
          path: k8s/

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      - name: Create namespace
        run: |
          kubectl create namespace production || true

      - name: Deploy BASE (production)
        run: kubectl apply -f k8s/base.yaml -n production

      - name: Deploy PRODUCTION config
        run: kubectl apply -f k8s/production.yaml

      - name: Deploy Grafana Ingress
        run: kubectl apply -f k8s/grafana-ingress.yaml

      - name: Deploy HPA
        run: kubectl apply -f k8s/hpa.yaml -n production

      - name: Rollout check + rollback
        run: |
          kubectl rollout status deployment/backend -n production || kubectl rollout undo deployment/backend -n production
          kubectl rollout status deployment/frontend -n production || kubectl rollout undo deployment/frontend -n production

      - name: Wait Mongo ready
        run: |
          kubectl rollout status statefulset/mongo -n production

      - name: Seed Data (production)
        run: |
          kubectl delete job seed-job -n production || true
          kubectl apply -f k8s/seed-job.yaml -n production
          kubectl wait --for=condition=complete job/seed-job -n production --timeout=120s || \
          kubectl logs job/seed-job -n production || exit 1

      - name: Debug
        run: |
          kubectl get pods -n production
          kubectl get ingress -n production