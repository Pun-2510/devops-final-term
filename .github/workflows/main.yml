name: CI/CD Pipeline for AWS EKS Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  SMTP_AUTH_PASSWORD: ${{ secrets.SMTP_AUTH_PASSWORD }}
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

# 1. Build & Push
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            project/backend/node_modules
            project/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install deps
        run: |
          cd project/backend && npm install
          cd ../frontend && npm install

      - name: Lint
        run: |
          cd project/backend && npx eslint@8.57.0 .
          cd ../frontend && npx eslint@8.57.0 .

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Build frontend
        run: |
          cd project/frontend && npm run build

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t $DOCKER_USER/backend-app:$IMAGE_TAG ./project/backend
          docker push $DOCKER_USER/backend-app:$IMAGE_TAG

      - name: Build & Push Frontend
        run: |
          docker build -t $DOCKER_USER/frontend-app:$IMAGE_TAG ./project/frontend
          docker push $DOCKER_USER/frontend-app:$IMAGE_TAG

      - name: Inject image into base.yaml and seed-job.yaml
        run: |
          sed -i "s|BACKEND_IMAGE|$DOCKER_USER/backend-app:$IMAGE_TAG|g" k8s/base.yaml
          sed -i "s|FRONTEND_IMAGE|$DOCKER_USER/frontend-app:$IMAGE_TAG|g" k8s/base.yaml
          sed -i "s|BACKEND_IMAGE|$DOCKER_USER/backend-app:$IMAGE_TAG|g" k8s/seed-job.yaml

      - name: Upload manifests
        uses: actions/upload-artifact@v4
        with:
          name: k8s
          path: |
            k8s/
            monitoring/

# 2. Staging
  staging-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    environment:
      name: staging
      url: https://staging.baocaohoc.online

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: k8s
          path: .

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME
      
      - name: Debug auth
        run: |
          echo "=== AWS Identity ==="
          aws sts get-caller-identity

          echo "=== Current Context ==="
          kubectl config current-context

          echo "=== Can access cluster? ==="
          kubectl get nodes   

      - name: Create namespace
        run: kubectl create namespace staging || true

      - name: Deploy BASE (staging)
        run: |
          kubectl apply -f k8s/configmap.yaml -n staging
          kubectl apply -f k8s/base.yaml -n staging

      - name: Deploy STAGING config
        run: kubectl apply -f k8s/staging.yaml

      - name: Wait Mongo ready
        run: kubectl rollout status statefulset/mongo -n staging

      - name: Seed Data (staging)
        run: |
          kubectl create -f k8s/seed-job.yaml -n staging

          JOB_NAME=$(kubectl get jobs -n staging \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath="{.items[-1].metadata.name}")

          kubectl wait --for=condition=complete job/$JOB_NAME -n staging --timeout=120s || \
          kubectl logs job/$JOB_NAME -n staging || exit 1

      - name: Rollout check
        run: |
          kubectl rollout status deployment/backend -n staging
          kubectl rollout status deployment/frontend -n staging

# 3. Production
  production-deploy:
    needs: staging-deploy
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://baocaohoc.online

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: k8s
          path: .

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      - name: Create namespaces
        run: |
          kubectl create namespace production || true
          kubectl create namespace monitoring || true

      - name: Create Alertmanager Secret
        run: |
          kubectl delete secret alertmanager-config -n monitoring || true
          sed "s|\${SMTP_AUTH_PASSWORD}|$SMTP_AUTH_PASSWORD|g" monitoring/alertmanager.yaml > am.yaml
          kubectl create secret generic alertmanager-config \
            --from-file=alertmanager.yaml=am.yaml \
            -n monitoring

      - name: Deploy kube-prometheus-stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            -n monitoring \
            -f monitoring/values.yaml

      - name: Restart Alertmanager
        run: |
          kubectl rollout restart statefulset alertmanager-kube-prometheus-stack-alertmanager -n monitoring

      - name: Deploy BASE
        run: |
          kubectl apply -f k8s/configmap.yaml -n production
          kubectl apply -f k8s/base.yaml -n production

      - name: Deploy PRODUCTION config
        run: kubectl apply -f k8s/production.yaml

      - name: Deploy Grafana Ingress
        run: kubectl apply -f k8s/grafana-ingress.yaml -n monitoring

      - name: Deploy Alert Rules 
        run: kubectl apply -f k8s/alerts/

      - name: Deploy HPA
        run: kubectl apply -f k8s/hpa.yaml -n production

      - name: Verify HPA
        run: |
          kubectl get hpa -n production
          kubectl describe hpa backend-hpa -n production || true

      - name: Rollout check + rollback
        run: |
          kubectl rollout status deployment/backend -n production || kubectl rollout undo deployment/backend -n production
          kubectl rollout status deployment/frontend -n production || kubectl rollout undo deployment/frontend -n production

      - name: Wait Mongo ready
        run: kubectl rollout status statefulset/mongo -n production

      - name: Seed Data (production)
        run: |
          kubectl create -f k8s/seed-job.yaml -n production

          JOB_NAME=$(kubectl get jobs -n production \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath="{.items[-1].metadata.name}")

          echo "Job name: $JOB_NAME"

          kubectl wait --for=condition=complete job/$JOB_NAME -n production --timeout=120s || \
          kubectl logs job/$JOB_NAME -n production || exit 1

      - name: Debug cluster state
        run: |
          kubectl get nodes
          kubectl get pods -n production
          kubectl get hpa -n production
          kubectl get ingress -n production