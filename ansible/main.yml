---
- name: Production-Grade Ingress and Cert-Manager Setup
  hosts: localhost
  connection: local
  vars:
    letsencrypt_email: "trangiathanh0205@gmail.com"
    ingress_ns: "ingress-nginx"
    cert_manager_ns: "cert-manager"
    monitoring_ns: "monitoring"

  tasks:
    - name: 1. Add Helm Repositories
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: 'metrics-server', url: 'https://kubernetes-sigs.github.io/metrics-server/' }
        - { name: 'ingress-nginx', url: 'https://kubernetes.github.io/ingress-nginx' }
        - { name: 'jetstack', url: 'https://charts.jetstack.io' }
        - { name: 'prometheus-community', url: 'https://prometheus-community.github.io/helm-charts' }

    - name: 1.1 Install Metrics Server
      kubernetes.core.helm:
        name: metrics-server
        chart_ref: metrics-server/metrics-server
        release_namespace: kube-system
        create_namespace: false
        values:
          args:
            - --kubelet-insecure-tls
            - --kubelet-preferred-address-types=InternalIP

    - name: 1.1.1 Wait Metrics Server Deployment Exists
      kubernetes.core.k8s_info:
        kind: Deployment
        name: metrics-server
        namespace: kube-system
      register: ms_init
      until: ms_init.resources | length > 0
      retries: 20
      delay: 10
    
    - name: 1.1.2 Wait for Metrics Server
      kubernetes.core.k8s_info:
        kind: Deployment
        name: metrics-server
        namespace: kube-system
      register: ms_status
      until:
        - ms_status.resources | length > 0
        - ms_status.resources[0].status.readyReplicas is defined
        - ms_status.resources[0].status.readyReplicas >= 1
      retries: 15
      delay: 10

    - name: 1.2 Install NGINX Ingress Controller
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: "{{ ingress_ns }}"
        create_namespace: true
        wait: true

    - name: 1.3 Install Cert-Manager (with CRDs)
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: "{{ cert_manager_ns }}"
        create_namespace: true
        wait: true
        values:
          installCRDs: true

    - name: 1.4 Install Prometheus and Grafana
      kubernetes.core.helm:
        name: kube-prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: "{{ monitoring_ns }}"
        create_namespace: true
        wait: true

    - name: 1.3.1 Wait for Cert-Manager Webhook Deployment (Retry Logic)
      kubernetes.core.k8s_info:
        kind: Deployment
        name: cert-manager-webhook
        namespace: "{{ cert_manager_ns }}"
      register: webhook_status
      until: 
        - webhook_status.resources is defined
        - webhook_status.resources | length > 0
        - webhook_status.resources[0].status.availableReplicas is defined
        - webhook_status.resources[0].status.availableReplicas >= 1
      retries: 15
      delay: 10

    - name: 1.3.2 Pause for Network Propagation
      pause:
        seconds: 15

    - name: 2. Create ClusterIssuer (Let's Encrypt Prod)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: "{{ letsencrypt_email }}"
              privateKeySecretRef:
                name: letsencrypt-prod-account-key
              solvers:
                - http01:
                    ingress:
                      class: nginx

    - name: 2.1 Wait for ClusterIssuer to be Ready
      kubernetes.core.k8s_info:
        api_version: cert-manager.io/v1
        kind: ClusterIssuer
        name: letsencrypt-prod
      register: issuer_check
      until:
        - issuer_check.resources is defined
        - issuer_check.resources | length > 0
        - issuer_check.resources[0].status.conditions is defined
        - (issuer_check.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | list | first).status == "True"
      retries: 20
      delay: 10