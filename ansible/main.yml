---
- name: Production-Grade Ingress and Cert-Manager Setup
  hosts: localhost
  connection: local

  vars:
    letsencrypt_email: "trangiathanh0205@gmail.com"
    ingress_ns: "ingress-nginx"
    cert_manager_ns: "cert-manager"

  tasks:
    - name: Add Helm Repositories
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: 'metrics-server', url: 'https://kubernetes-sigs.github.io/metrics-server/' }
        - { name: 'ingress-nginx', url: 'https://kubernetes.github.io/ingress-nginx' }
        - { name: 'jetstack', url: 'https://charts.jetstack.io' }

    - name: Install Metrics Server
      kubernetes.core.helm:
        name: metrics-server
        chart_ref: metrics-server/metrics-server
        release_namespace: kube-system
        create_namespace: false
        wait: true
        chart_version: "3.12.1"
        values:
          args:
            - --kubelet-insecure-tls
            - --kubelet-preferred-address-types=InternalIP

    - name: Install NGINX Ingress Controller
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: "{{ ingress_ns }}"
        create_namespace: true
        wait: true
        chart_version: "4.10.0"

    - name: Wait for ingress-nginx controller
      kubernetes.core.k8s_info:
        kind: Deployment
        name: ingress-nginx-controller
        namespace: "{{ ingress_ns }}"
      register: ingress_status
      until:
        - ingress_status.resources | length > 0
        - ingress_status.resources[0].status.availableReplicas | default(0) >= 1
      retries: 20
      delay: 10

    - name: Install Cert-Manager (with CRDs)
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: "{{ cert_manager_ns }}"
        create_namespace: true
        wait: true
        chart_version: "1.14.4"
        values:
          installCRDs: true

    - name: Wait for Cert-Manager Webhook
      kubernetes.core.k8s_info:
        kind: Deployment
        name: cert-manager-webhook
        namespace: "{{ cert_manager_ns }}"
      register: webhook_status
      until:
        - webhook_status.resources | length > 0
        - webhook_status.resources[0].status.availableReplicas | default(0) >= 1
      retries: 15
      delay: 10

    - name: Pause for propagation
      pause:
        seconds: 15

    - name: Create ClusterIssuer (Let's Encrypt Prod)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: "{{ letsencrypt_email }}"
              privateKeySecretRef:
                name: letsencrypt-prod-account-key
              solvers:
                - http01:
                    ingress:
                      class: nginx

    - name: Wait for ClusterIssuer Ready
      kubernetes.core.k8s_info:
        api_version: cert-manager.io/v1
        kind: ClusterIssuer
        name: letsencrypt-prod
      register: issuer_check
      until:
        - issuer_check.resources | length > 0
        - issuer_check.resources[0].status is defined
        - issuer_check.resources[0].status.conditions is defined
        - (issuer_check.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | list | length) > 0
        - (issuer_check.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | list | first).status == "True"
      retries: 20
      delay: 10