apiVersion: v1
data:
  index.html: "    <!DOCTYPE html>\r\n    <html lang=\"en\">\r\n    <head>\r\n    <meta
    charset=\"UTF-8\" />\r\n    <title>Final Exam Rubric – Production-Grade CI/CD
    System</title>\r\n    <style>\r\n      body {\r\n        font-family: Arial, Helvetica,
    sans-serif;\r\n        margin: 20px;\r\n      }\r\n\r\n      h1, h2 {\r\n        text-align:
    center;\r\n      }\r\n\r\n      table {\r\n        width: 100%;\r\n        border-collapse:
    collapse;\r\n        table-layout: fixed;\r\n        margin-bottom: 30px;\r\n
    \     }\r\n\r\n      th, td {\r\n        border: 1px solid #444;\r\n        padding:
    12px;\r\n        text-align: center;\r\n        vertical-align: middle;\r\n        word-wrap:
    break-word;\r\n      }\r\n\r\n      th {\r\n        background-color: #f2f2f2;\r\n
    \       font-weight: bold;\r\n      }\r\n\r\n      td.description {\r\n        text-align:
    left;\r\n      }\r\n\r\n      .score-col {\r\n        width: 12%;\r\n        font-weight:
    bold;\r\n      }\r\n\r\n      .criteria-col {\r\n        width: 88%;\r\n      }\r\n\r\n
    \     .note {\r\n        border: 1px solid #999;\r\n        padding: 15px;\r\n
    \       background-color: #fafafa;\r\n        margin-top: 20px;\r\n      }\r\n
    \   </style>\r\n    </head>\r\n\r\n    <body>\r\n\r\n    <h1>FINAL EXAM RUBRIC</h1>\r\n
    \   <h2>Production-Grade CI/CD System (Total: 10.0 points)</h2>\r\n\r\n    <!--
    1. Infrastructure -->\r\n    <table>\r\n        <colgroup>\r\n        <col style=\"width:12%\">\r\n
    \       <col style=\"width:88%\">\r\n      </colgroup>\r\n      <tr>\r\n        <th
    colspan=\"2\">1. Infrastructure Provisioning & Environment Readiness (2.0 points)</th>\r\n
    \     </tr>\r\n      <tr>\r\n        <th class=\"score-col\">Score</th>\r\n        <th
    class=\"criteria-col\">Description</th>\r\n      </tr>\r\n      <tr>\r\n        <td
    class=\"score-col\">0.0</td>\r\n        <td class=\"description\">No functional
    cloud environment; system not reachable via public domain.</td>\r\n      </tr>\r\n
    \     <tr>\r\n        <td>1.0</td>\r\n        <td class=\"description\">Manual
    provisioning on a real cloud server; domain and HTTPS correctly configured; environment
    stable but mostly manual.</td>\r\n      </tr>\r\n      <tr>\r\n        <td>1.5</td>\r\n
    \       <td class=\"description\">Partial automation (Terraform or Ansible or
    structured scripts); environment reproducible with minor manual steps.</td>\r\n
    \     </tr>\r\n      <tr>\r\n        <td>2.0</td>\r\n        <td class=\"description\">Full
    Infrastructure as Code using Terraform and configuration management; idempotent
    setup; secure and production-ready environment with clear evidence.</td>\r\n      </tr>\r\n
    \   </table>\r\n\r\n    <!-- 2. Architecture -->\r\n    <table>\r\n        <colgroup>\r\n
    \       <col style=\"width:12%\">\r\n        <col style=\"width:88%\">\r\n      </colgroup>\r\n
    \     <tr>\r\n        <th colspan=\"2\">2. Architecture & Deployment Model (Tier-Based
    Execution Quality) (2.5 points)</th>\r\n      </tr>\r\n      <tr>\r\n        <th
    class=\"score-col\">Score</th>\r\n        <th class=\"criteria-col\">Description</th>\r\n
    \     </tr>\r\n      <tr>\r\n        <td>0.0</td>\r\n        <td class=\"description\">Deployment
    fails or system is not operational.</td>\r\n      </tr>\r\n      <tr>\r\n        <td>1.0</td>\r\n
    \       <td class=\"description\">Tier 1 – Single-server non-containerized deployment
    using systemd or PM2; operational but limited scalability.</td>\r\n      </tr>\r\n
    \     <tr>\r\n        <td>1.5</td>\r\n        <td class=\"description\">Tier 2
    – Single-server containerized deployment (Docker Compose) with correct service
    separation and persistent storage.</td>\r\n      </tr>\r\n      <tr>\r\n        <td>2.0</td>\r\n
    \       <td class=\"description\">Tier 3 – Multi-server architecture with centralized
    load balancing (managed cloud load balancer preferred); horizontal scaling demonstrated.</td>\r\n
    \     </tr>\r\n      <tr>\r\n        <td>2.5</td>\r\n        <td class=\"description\">Tier
    4 or Tier 5 – Docker Swarm or Kubernetes orchestration with service replication,
    resilience, and scalable architecture.</td>\r\n      </tr>\r\n    </table>\r\n\r\n
    \   <!-- 3. CI/CD -->\r\n    <table>\r\n        <colgroup>\r\n        <col style=\"width:12%\">\r\n
    \       <col style=\"width:88%\">\r\n      </colgroup>\r\n      <tr>\r\n        <th
    colspan=\"2\">3. CI/CD Pipeline Implementation (CI + CD + DevSecOps) (2.5 points)</th>\r\n
    \     </tr>\r\n      <tr>\r\n        <th class=\"score-col\">Score</th>\r\n        <th
    class=\"criteria-col\">Description</th>\r\n      </tr>\r\n      <tr>\r\n        <td>0.0</td>\r\n
    \       <td class=\"description\">No working CI/CD pipeline.</td>\r\n      </tr>\r\n
    \     <tr>\r\n        <td>1.0</td>\r\n        <td class=\"description\">Basic
    automated pipeline (build → deploy); limited checks and weak versioning.</td>\r\n
    \     </tr>\r\n      <tr>\r\n        <td>1.5</td>\r\n        <td class=\"description\">Functional
    CI pipeline (lint, build, caching) and automated CD; security integration minimal
    or incomplete.</td>\r\n      </tr>\r\n      <tr>\r\n        <td>2.0</td>\r\n        <td
    class=\"description\">Complete CI/CD pipeline with versioned artifacts or images,
    automated deployment, and security scanning integrated.</td>\r\n      </tr>\r\n
    \     <tr>\r\n        <td>2.5</td>\r\n        <td class=\"description\">Production-grade
    CI/CD with enforced security fail gates, clean versioning strategy, and controlled
    deployment behaviour.</td>\r\n      </tr>\r\n    </table>\r\n\r\n    <!-- 4. Monitoring
    -->\r\n    <table>\r\n        <colgroup>\r\n        <col style=\"width:12%\">\r\n
    \       <col style=\"width:88%\">\r\n      </colgroup>\r\n      <tr>\r\n        <th
    colspan=\"2\">4. Monitoring, Observability & Runtime Awareness (1.0 point)</th>\r\n
    \     </tr>\r\n      <tr>\r\n        <th class=\"score-col\">Score</th>\r\n        <th
    class=\"criteria-col\">Description</th>\r\n      </tr>\r\n      <tr>\r\n        <td>0.0</td>\r\n
    \       <td class=\"description\">No monitoring system, or monitoring installed
    but not functioning.</td>\r\n      </tr>\r\n      <tr>\r\n        <td>0.5</td>\r\n
    \       <td class=\"description\">Monitoring stack operational (Prometheus + Grafana)
    with basic system metrics visible.</td>\r\n      </tr>\r\n      <tr>\r\n        <td>1.0</td>\r\n
    \       <td class=\"description\">Monitoring meaningfully integrated; dashboards
    clearly reflect system behaviour and are used during deployment or failure demonstration.</td>\r\n
    \     </tr>\r\n    </table>\r\n\r\n    <!-- 5. Demo -->\r\n    <table>\r\n        <colgroup>\r\n
    \       <col style=\"width:12%\">\r\n        <col style=\"width:88%\">\r\n      </colgroup>\r\n
    \     <tr>\r\n        <th colspan=\"2\">5. Mandatory Demonstration (Video Demo
    and/or Live Presentation) (1.0 point)</th>\r\n      </tr>\r\n      <tr>\r\n        <th
    class=\"score-col\">Score</th>\r\n        <th class=\"criteria-col\">Description</th>\r\n
    \     </tr>\r\n      <tr>\r\n        <td>0.0</td>\r\n        <td class=\"description\">Demo
    missing or heavily staged; CI/CD flow not demonstrated end-to-end.</td>\r\n      </tr>\r\n
    \     <tr>\r\n        <td>0.5</td>\r\n        <td class=\"description\">Partial
    demo; some stages shown but missing production verification or monitoring evidence.</td>\r\n
    \     </tr>\r\n      <tr>\r\n        <td>1.0</td>\r\n        <td class=\"description\">Complete
    end-to-end demonstration from code change to production update, HTTPS verification,
    monitoring inspection, and failure simulation.</td>\r\n      </tr>\r\n    </table>\r\n\r\n
    \   <!-- 6. Report -->\r\n    <table>\r\n        <colgroup>\r\n        <col style=\"width:12%\">\r\n
    \       <col style=\"width:88%\">\r\n      </colgroup>\r\n      <tr>\r\n        <th
    colspan=\"2\">6. Technical Report (Academic Quality & Evidence Integration) (1.0
    point)</th>\r\n      </tr>\r\n      <tr>\r\n        <th class=\"score-col\">Score</th>\r\n
    \       <th class=\"criteria-col\">Description</th>\r\n      </tr>\r\n      <tr>\r\n
    \       <td>0.0</td>\r\n        <td class=\"description\">Report missing, incomplete,
    or lacks technical coherence.</td>\r\n      </tr>\r\n      <tr>\r\n        <td>0.5</td>\r\n
    \       <td class=\"description\">Report complete and understandable but limited
    in analysis or evidence integration.</td>\r\n      </tr>\r\n      <tr>\r\n        <td>1.0</td>\r\n
    \       <td class=\"description\">Professional academic report with clear structure,
    justified design decisions, diagrams, and well-integrated evidence.</td>\r\n      </tr>\r\n
    \   </table>\r\n\r\n    <div class=\"note\">\r\n      <strong>Important Submission
    Notes (Not Graded Separately):</strong>\r\n      <ul>\r\n        <li>Submission
    completeness and professionalism are mandatory but not scored separately.</li>\r\n
    \       <li>Any feature or functionality will only be recognized for scoring if
    it appears in both the video demo (and/or live presentation) and the technical
    report.</li>\r\n        <li>Features implemented but not demonstrated and documented
    will be treated as non-existent for grading purposes.</li>\r\n      </ul>\r\n
    \   </div>\r\n\r\n    </body>\r\n    </html>"
kind: ConfigMap
metadata:
  name: web-html
