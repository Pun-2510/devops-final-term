apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-down-alert
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: pod.rules
      rules:
        - alert: PodDown
          expr: |
            (
              kube_pod_status_ready{condition="true", namespace="production"} == 0
              and on(pod, namespace)
              kube_pod_status_phase{phase="Running", namespace="production"} == 1
            )
            and on(pod, namespace)
            kube_pod_owner{namespace="production", owner_kind!="Job"}
          for: 5s
          labels:
            severity: critical
          annotations:
            summary: "Pod is down"
            description: "Pod is not ready"