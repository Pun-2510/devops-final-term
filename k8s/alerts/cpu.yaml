apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cpu-alert
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: cpu.rules
      rules:
        - alert: HighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{container!=""}[1m])) by (pod) > 0.1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High CPU Usage"
            description: "CPU usage is above 40% for 1 minute"